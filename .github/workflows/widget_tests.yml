name: Widget Tests

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get MyoroPlayer code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Display Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        run: cd myoro_player && flutter pub get

      - name: Run tests
        run: cd myoro_player && flutter test